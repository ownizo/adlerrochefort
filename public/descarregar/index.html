  <style>
    :root {
      --primary: #1B6B93;
      --primary-hover: #2196C8;
      --cream: #F8FAFB;
      --ink: #1E3A50;
      --ink2: #2C4D66;
      --muted: #5A7186;
      --white: #FFFFFF;
      --border: #D0D9E0;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--cream);
      font-family: 'Montserrat', sans-serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;

      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);

    .logo {
      height: 60px;
      margin-bottom: 28px;
    }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .download-btn {
      display: inline-block;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 16px 40px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .download-btn:hover {
      background: var(--primary-hover);
    }
    .note {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .back-link {
      margin-top: 20px;
      font-size: 13px;
    }
    .back-link a {
      color: var(--primary);
      text-decoration: none;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
